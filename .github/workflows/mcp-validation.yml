name: MCP Validation

on:
  push:
  pull_request:

jobs:
  validate-mcp:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build MCP server
        run: dotnet build .\VsMcpBridge.McpServer\VsMcpBridge.McpServer.csproj --nologo

      - name: Run MCP validation script
        shell: pwsh
        run: .\SolutionFolder\scripts\validate-mcp.ps1
